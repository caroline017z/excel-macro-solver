name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (editable + dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
        # pywin32 is platform-gated in pyproject (Windows only), so the
        # Linux leg installs the pure-Python deps and the COM modules import
        # win32/pythoncom lazily inside functions — collection stays green.

      - name: Lint (ruff)
        run: ruff check dn38_solver tests

      - name: Tests (pytest)
        run: pytest -q
        # The two real-workbook incident regressions skip when their Desktop
        # fixtures are absent (every CI runner). Once C26 lands — the openpyxl
        # keep_vba ZipFile handle leak that emits PytestUnraisableExceptionWarning
        # is fixed — tighten this to:
        #   pytest -q -W error::pytest.PytestUnraisableExceptionWarning

  typecheck:
    name: mypy (advisory)
    runs-on: ubuntu-latest
    # mypy strict has ~128 pre-existing findings across the package (C24).
    # Run it so regressions are visible and the count can be driven down,
    # but don't block merges until the backlog is triaged. Flip to blocking
    # (remove continue-on-error) once `mypy dn38_solver` is clean.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install (editable + dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Type-check (mypy)
        run: mypy dn38_solver
